# SteelSeries gaming peripherals -- Xorg InputClass
#
# WHY:  The Rival 710 re-enumerates 3 times during firmware init, causing
#       stale device handles in Xorg.  This InputClass ensures libinput
#       re-acquires the device cleanly after each re-enumeration.
#
# WHAT: Matches SteelSeries pointer and keyboard devices by vendor ID (1038).
#       Sets explicit libinput options for stability under high system load.
#
# HOW:  Installed to /etc/X11/xorg.conf.d/45-steelseries.conf.
#       Loaded after 40-input.conf (generic) but before 50-monitor.conf.

Section "InputClass"
    Identifier "SteelSeries pointer"
    MatchIsPointer "on"
    MatchDevicePath "/dev/input/event*"
    MatchUSBID "1038:*"
    Driver "libinput"
    Option "AccelProfile" "flat"
    Option "AccelSpeed" "0"
    Option "NaturalScrolling" "off"
    # Disable middle-button emulation to avoid synthetic button state
    Option "MiddleEmulation" "off"
EndSection

Section "InputClass"
    Identifier "SteelSeries keyboard"
    MatchIsKeyboard "on"
    MatchDevicePath "/dev/input/event*"
    MatchUSBID "1038:*"
    Driver "libinput"
EndSection
