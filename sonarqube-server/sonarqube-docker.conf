# SonarQube Docker Container Configuration
# Configuration file for SonarQube server deployed via Docker

# Container Settings
SONARQUBE_IMAGE=sonarqube:latest
SONARQUBE_CONTAINER_NAME=sonarqube
SONARQUBE_PORT=9000

# Data Directory (persistent storage for all analysis results)
SONARQUBE_DATA_DIR=/var/lib/sonarqube

# Resource Limits
SONARQUBE_MEMORY_LIMIT=2g
SONARQUBE_CPUS_LIMIT=2

# Scanner Configuration
SONAR_HOST_URL=http://localhost:9000
SONAR_LOGIN=admin
SONAR_PASSWORD=admin

# Database (internal PostgreSQL managed by container)
SONAR_JDBC_URL=jdbc:postgresql://localhost:5432/sonarqube
SONAR_JDBC_USERNAME=sonarqube
SONAR_JDBC_PASSWORD=sonarqube

# Optional: External PostgreSQL (uncomment if using remote database)
# SONAR_JDBC_URL=jdbc:postgresql://db.example.com:5432/sonarqube
# SONAR_JDBC_USERNAME=sonarqube
# SONAR_JDBC_PASSWORD=<password>

# Security Settings
SONARQUBE_SECURE_COOKIES=true
SONARQUBE_DISABLE_TELEMETRY=false

# Debug/Logging
SONARQUBE_LOG_LEVEL=INFO
