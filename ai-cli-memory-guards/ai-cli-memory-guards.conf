# /etc/ai-cli-memory-guards.conf
# Host defaults loaded by codex-guard / claude-guard / gemini-guard / copilot-guard

# Conservative default old-space cap in MiB.
AI_CLI_MAX_OLD_SPACE_SIZE=3072

# Young generation tuning in MiB.
AI_CLI_MAX_SEMI_SPACE_SIZE=64

# Copilot-only: disable parallel tool execution by default.
AI_CLI_DISABLE_PARALLEL_TOOLS=1

# Codex-only toggle; set to 1 to pass --search by default.
AI_CLI_CODEX_ENABLE_SEARCH=0
