# nvidia-oc-nvml configuration
# Applied at boot by nvidia-oc-nvml.service
#
# Uses NVML API -- works with both open and proprietary kernel modules.
# No Coolbits or nvidia-settings required. Supports Wayland and X11.
#
# RTX 4070 Ti safe ranges (community-tested):
#   Core: +150 (conservative) / +200 (moderate) / +250 (aggressive)
#   Memory: +500 (conservative) / +1000 (moderate) / +1500-2000 (aggressive)
#   Power: 310W (conservative) / 325W (moderate) / 340W (max spec)

[overclock]
core_offset_mhz = 200
mem_offset_mhz = 1000
power_limit_watts = 340
