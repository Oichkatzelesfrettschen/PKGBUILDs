[overrides]
# Match Firefox 128's TLS cipher suite order to avoid Cloudflare JA3
# fingerprint detection. GnuTLS default order (AES-256 first) differs
# from Firefox (AES-128 first), which is a major JA3 signal.
#
# Firefox 128 order: AES-128-GCM, CHACHA20, AES-256-GCM, then CBC fallbacks
# Groups: X25519 first (Firefox default), then P-256, P-384
default-priority-string = NONE:+VERS-TLS1.3:+VERS-TLS1.2:+AES-128-GCM:+CHACHA20-POLY1305:+AES-256-GCM:+AES-256-CBC:+AES-128-CBC:+ECDHE-ECDSA:+ECDHE-RSA:+RSA:+SHA256:+SHA384:+SHA1:+AEAD:+COMP-NULL:+GROUP-X25519:+GROUP-SECP256R1:+GROUP-SECP384R1:+GROUP-SECP521R1:+GROUP-FFDHE2048:+GROUP-FFDHE3072:+SIGN-ECDSA-SECP256R1-SHA256:+SIGN-ECDSA-SECP384R1-SHA384:+SIGN-ECDSA-SECP521R1-SHA512:+SIGN-RSA-PSS-RSAE-SHA256:+SIGN-RSA-PSS-RSAE-SHA384:+SIGN-RSA-PSS-RSAE-SHA512:+SIGN-RSA-SHA256:+SIGN-RSA-SHA384:+SIGN-RSA-SHA512:+CTYPE-X509
