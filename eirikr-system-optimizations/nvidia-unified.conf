# NVIDIA Unified Configuration - RTX 4070 Ti on CachyOS
# Target: /etc/modprobe.d/nvidia-unified.conf
# Generated: 2025-12-24
#
# This config consolidates and harmonizes:
# - /usr/lib/modprobe.d/nvidia.conf (CachyOS defaults)
# - /usr/lib/modprobe.d/nvidia-sleep.conf (suspend/resume)
# - /etc/modprobe.d/nvidia-ricing.conf (user customizations)
# - /etc/modprobe.d/99-nvidia-raw-uncapped.conf (performance tuning)
#
# After installation, remove the superseded /etc files.

# ==============================================================================
# NVIDIA BASE DRIVER
# ==============================================================================
options nvidia \
    NVreg_UsePageAttributeTable=1 \
    NVreg_InitializeSystemMemoryAllocations=0 \
    NVreg_DynamicPowerManagement=0x02 \
    NVreg_EnableResizableBar=1 \
    NVreg_EnableGpuFirmware=1 \
    NVreg_RestrictProfilingToAdminUsers=0 \
    NVreg_EnableStreamMemOPs=1 \
    NVreg_RegistryDwords=""

# IMPORTANT: NVreg_RegistryDwords="" above explicitly OVERRIDES the CachyOS default
# in /usr/lib/modprobe.d/nvidia.conf which sets RmEnableAggressiveVblank=1.
# This was causing desktop/terminal stutter and potential display timing glitches.
# To re-enable, use: NVreg_RegistryDwords="RMIntrLockingMode=1;RmEnableAggressiveVblank=1"


# ==============================================================================
# TWEAK RATIONALE AND TRADEOFFS (PERFORMANCE + STABILITY)
# ==============================================================================
# NVreg_UsePageAttributeTable=1
#   + Better CPU<->GPU memory mapping, typically lower overhead.
#   - If a platform has PAT issues, can cause instability (rare).
#
# NVreg_InitializeSystemMemoryAllocations=0
#   + Performance (skip zeroing system memory before GPU use).
#   - Security tradeoff: may expose stale memory contents to the GPU.
#
# NVreg_DynamicPowerManagement=0x02
#   + Fine-grained power management for Ada desktop; good balance of perf/idle.
#   - If you see power-state related instability, try 0x01 or 0x00.
#
# NVreg_EnableResizableBar=1
#   + ReBAR can improve performance in some titles/workloads.
#   - Requires BIOS support; if you see regressions, disable here and in BIOS.
#
# NVreg_EnableGpuFirmware=1
#   + Required for nvidia-open; enables modern firmware features.
#   - None expected (mandatory on your driver stack).
#
# NVreg_EnableStreamMemOPs=1 \
    NVreg_RegistryDwords=""

# IMPORTANT: NVreg_RegistryDwords="" above explicitly OVERRIDES the CachyOS default
# in /usr/lib/modprobe.d/nvidia.conf which sets RmEnableAggressiveVblank=1.
# This was causing desktop/terminal stutter and potential display timing glitches.
# To re-enable, use: NVreg_RegistryDwords="RMIntrLockingMode=1;RmEnableAggressiveVblank=1"
#   + Improves CUDA/compute memory ops on modern GPUs.
#   - If a specific CUDA workload regresses, try disabling.
#
# NVreg_RegistryDwords="RMIntrLockingMode=1;RmEnableAggressiveVblank=1"
#   + RMIntrLockingMode can smooth frame pacing; AggressiveVblank lowers ISR cost.
#   - Can cause stutter or display timing glitches on some setups.
#
# NVreg_RestrictProfilingToAdminUsers=0
#   + Allows non-root profiling tools (dev-friendly).
#   - Security tradeoff: exposes profiling to unprivileged users.

# ==============================================================================
# NVIDIA MODESET (Display/VRR)
# ==============================================================================
options nvidia_modeset \
    conceal_vrr_caps=1 \
    disable_vrr_memclk_switch=1 \
    opportunistic_display_sync=1 \
    vblank_sem_control=1 \
    enable_overlay_layers=1

# ==============================================================================
# NVIDIA DRM (Kernel Mode Setting)
# ==============================================================================
options nvidia_drm \
    modeset=1 \
    fbdev=1

# ==============================================================================
# NVIDIA UVM (Unified Virtual Memory - CUDA/Compute)
# ==============================================================================
# Note: uvm_release_asserts=0 disables debug assertions for production
options nvidia_uvm \
    uvm_release_asserts=0 \
    uvm_page_table_location=vid \
    uvm_peer_copy=virt \
    uvm_perf_prefetch_enable=1 \
    uvm_perf_access_counter_migration_enable=1 \
    uvm_perf_prefetch_min_faults=1 \
    uvm_perf_access_counter_threshold=64 \
    uvm_global_oversubscription=1 \
    uvm_perf_fault_batch_count=512

# ==============================================================================
# SUSPEND/RESUME (from nvidia-sleep.conf)
# ==============================================================================
# These are handled via systemd services in /usr/lib/systemd/system/
# nvidia-suspend.service, nvidia-hibernate.service, nvidia-resume.service
# NVreg_PreserveVideoMemoryAllocations=1 and NVreg_TemporaryFilePath=/var/tmp
# are set in /usr/lib/modprobe.d/nvidia-sleep.conf - do not duplicate here

# ==============================================================================
# VERIFICATION COMMANDS
# ==============================================================================
# Check base driver parameters:
#   cat /proc/driver/nvidia/params
#
# Check UVM parameters:
#   ls -la /sys/module/nvidia_uvm/parameters/
#   cat /sys/module/nvidia_uvm/parameters/uvm_release_asserts
#
# Verify ReBAR:
#   nvidia-smi -q | grep -i bar
#
# Check modeset status:
#   cat /sys/module/nvidia_drm/parameters/modeset
