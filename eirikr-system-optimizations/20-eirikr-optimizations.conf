# System optimizations for AMD Ryzen 5600X3D + NVIDIA RTX 4070 Ti
# WHY: CachyOS performance tuning for gaming and mixed workloads
# WHAT: Kernel boot parameters for CPU, GPU, and storage optimization
# HOW: Drop-in for sdboot-manage.conf (override default LINUX_OPTIONS)

LINUX_OPTIONS="zswap.enabled=0 nowatchdog splash amd_iommu=on iommu=pt amd-pstate=active transparent_hugepage=madvise pcie_aspm=off pci=realloc mitigations=off split_lock_mitigate=0 nvme_core.default_ps_max_latency_us=0 libata.force=5:disable,6:disable"
