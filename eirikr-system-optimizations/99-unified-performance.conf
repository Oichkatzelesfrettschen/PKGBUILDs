# Unified Performance Configuration - CachyOS Desktop/Gaming
# Target: /etc/sysctl.d/99-unified-performance.conf
# Generated: 2025-12-24
#
# This config consolidates and harmonizes:
# - 99-gaming-performance.conf (gaming, audio, scheduler)
# - 99-network-performance.conf (2.5GbE optimization)
# - 99-zzz-performance-override.conf (final overrides)
#
# After installation, remove the superseded files.
#
# Apply: sudo sysctl --system
# Verify: sysctl -a | grep <parameter>

# ==============================================================================
# VIRTUAL MEMORY
# ==============================================================================

# Max memory map areas - CRITICAL for Proton/Wine games
# Default: 65530, Required: 2147483642 for modern games
vm.max_map_count = 2147483642

# Compaction proactiveness - disable for reduced jitter
vm.compaction_proactiveness = 0

# Page lock unfairness - throughput optimization
vm.page_lock_unfairness = 5

# VFS cache pressure - balanced reclaim
vm.vfs_cache_pressure = 100

# Zone reclaim - disable for better NUMA performance
vm.zone_reclaim_mode = 0

# Min free memory - 256MB reserved for emergency
vm.min_free_kbytes = 262144

# Overcommit - allow for gaming workloads
vm.overcommit_memory = 1
vm.overcommit_ratio = 100

# Stat update interval - reduce overhead
vm.stat_interval = 10

# NOTE: vm.swappiness intentionally omitted
# ZRAM zram-generator dynamically sets vm.swappiness=150 at runtime
# Static sysctl values are overridden and wasteful

# ==============================================================================
# ==============================================================================
# DIRTY PAGE WRITEBACK (TUNED FOR HEAVY I/O WORKLOADS)
# ==============================================================================
# Updated: 2025-12-26
# WHY: Prevent I/O storms from heavy build tools (gradle, vale, markdownlint)
# WHAT: More aggressive writeback to NVMe - flush sooner, smaller batches
# HOW: Reduced ratios and timing to avoid large dirty page accumulation

# Flush at 5% dirty (was 10%) - prevents I/O storms
vm.dirty_ratio = 5

# Start background writeback at 2% dirty (was 5%)
vm.dirty_background_ratio = 2

# Writeback every 5 seconds (was 15) - more frequent small flushes
vm.dirty_writeback_centisecs = 500

# Pages expire after 10 seconds (was 30) - faster aging
vm.dirty_expire_centisecs = 1000

# ==============================================================================
# NETWORK CORE
# ==============================================================================

# Socket buffer sizes (optimized for 2.5GbE)
net.core.rmem_default = 1048576
net.core.rmem_max = 16777216
net.core.wmem_default = 1048576
net.core.wmem_max = 16777216

# Packet queue optimization
net.core.netdev_max_backlog = 10000
net.core.netdev_budget = 600
net.core.netdev_budget_usecs = 4000

# Connection backlog
net.core.somaxconn = 8192

# Queue discipline - fq_codel for low latency
net.core.default_qdisc = fq_codel

# ==============================================================================
# TCP/IP STACK
# ==============================================================================

# TCP buffer sizes (min, default, max)
net.ipv4.tcp_rmem = 4096 1048576 16777216
net.ipv4.tcp_wmem = 4096 1048576 16777216

# BBR congestion control
net.ipv4.tcp_congestion_control = bbr

# TCP features
net.ipv4.tcp_window_scaling = 1
net.ipv4.tcp_timestamps = 1
net.ipv4.tcp_sack = 1

# Low latency optimizations
net.ipv4.tcp_fastopen = 3
net.ipv4.tcp_low_latency = 1
net.ipv4.tcp_no_metrics_save = 1
net.ipv4.tcp_slow_start_after_idle = 0

# SYN backlog
net.ipv4.tcp_max_syn_backlog = 8192

# UDP minimums
net.ipv4.udp_rmem_min = 8192
net.ipv4.udp_wmem_min = 8192

# ==============================================================================
# NETFILTER / CONNECTION TRACKING
# ==============================================================================

net.netfilter.nf_conntrack_max = 262144

# ==============================================================================
# FILESYSTEM
# ==============================================================================

# Maximum file handles
fs.file-max = 2097152

# Inotify limits (Steam, Lutris, IDEs, DAWs)
fs.inotify.max_user_watches = 1048576
fs.inotify.max_user_instances = 1024
fs.inotify.max_queued_events = 32768

# Async I/O
fs.aio-max-nr = 1048576

# ==============================================================================
# KERNEL / SCHEDULER
# ==============================================================================

# Process/thread limits
kernel.pid_max = 4194304
kernel.threads-max = 4194304

# Autogroup scheduling for desktop responsiveness
kernel.sched_autogroup_enabled = 1

# CFS bandwidth slice (microseconds)
kernel.sched_cfs_bandwidth_slice_us = 3000

# Watchdog disabled (matches cmdline nowatchdog)
kernel.nmi_watchdog = 0

# Panic behavior
kernel.panic = 10
kernel.panic_on_oops = 1

# Core dump pattern - REMOVED
# WHY: Use systemd-coredump instead (99-coredump-override.conf)
# kernel.core_pattern = core  # REMOVED - use systemd-coredump
# kernel.core_uses_pid = 1    # REMOVED - systemd-coredump handles naming

# Console messages - errors only
kernel.printk = 3 3 3 3

# Security - keep BPF restricted
kernel.unprivileged_bpf_disabled = 1

# ==============================================================================
# NOTES
# ==============================================================================
#
# BORE scheduler (CachyOS kernel) does not support these legacy parameters:
# - kernel.sched_latency_ns
# - kernel.sched_min_granularity_ns
# - kernel.sched_wakeup_granularity_ns
# They are intentionally omitted.
#
# ZRAM dynamically sets vm.swappiness=150 via zram-generator.
# Do not set vm.swappiness here; it will be overridden.
