name: Update Check

on:
  schedule:
    # Run every Monday at 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:  # allow manual trigger

jobs:
  check-updates:
    name: Check for upstream updates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y curl jq

      - name: Run update checker
        id: updates
        run: |
          OUTPUT=$(sh scripts/check-updates.sh --verbose 2>&1)
          echo "$OUTPUT"
          # Check if any outdated packages were reported
          if echo "$OUTPUT" | grep -q 'current=.*latest='; then
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
            echo "updates_body<<EOF" >> "$GITHUB_OUTPUT"
            echo "$OUTPUT" | grep 'current=.*latest=' >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create issue for outdated packages
        if: steps.updates.outputs.has_updates == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Package update check: ${new Date().toISOString().slice(0,10)}`;
            const body = `## Outdated packages detected\n\n\`\`\`\n${{ steps.updates.outputs.updates_body }}\n\`\`\`\n\nPlease update the relevant PKGBUILDs and regenerate \`.SRCINFO\` files.\n\n_This issue was automatically created by the weekly update-check workflow._`;

            // Check for existing open issue with same title prefix
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'package-update'
            });

            const existing = issues.data.find(i => i.title.startsWith('Package update check:'));
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                title,
                body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['package-update']
              });
            }
